<section class="hero" id="hero">
  <div class="hero-content">
    {% if site.data.portfolio.about.avatar != "" %}
    <img src="{{ site.data.portfolio.about.avatar | relative_url }}" alt="{{ site.data.portfolio.about.name }}" class="hero-avatar">
    {% else %}
    <div class="hero-avatar-placeholder">
      <span>{{ site.data.portfolio.about.name | split: " " | map: "first" | join: "" }}</span>
    </div>
    {% endif %}
    <h1 class="hero-name">{{ site.data.portfolio.about.name }}</h1>
    <p class="hero-tagline">{{ site.data.portfolio.about.tagline }}</p>
    <div class="hero-cta">
      <a href="#projects" class="btn btn-primary">
        <i class="fas fa-rocket"></i> View Projects
      </a>
      <a href="{{ site.data.portfolio.contact.cv_download }}" class="btn btn-outline" download>
        <i class="fas fa-download"></i> Download CV
      </a>
      <a href="#contact" class="btn btn-outline">
        <i class="fas fa-envelope"></i> Contact Me
      </a>
    </div>
  </div>
</section>
