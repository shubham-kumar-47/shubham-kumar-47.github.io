<section class="blog-section" id="blog">
  <div class="container">
    <div class="section-header reveal">
      <h2>Blog</h2>
      <p>Breaking down complex ideas into actionable insights</p>
    </div>
    <div class="blog-grid">
      {% for post in site.data.portfolio.blog.posts %}
      <a href="{{ post.url }}" target="_blank" rel="noopener" class="blog-card reveal" style="text-decoration: none;">
        <p class="blog-date"><i class="fab fa-medium"></i> {{ post.date }}</p>
        <h4>{{ post.title }}</h4>
        <p>{{ post.excerpt }}</p>
        {% if post.tags %}
        <div style="margin-top: 0.75rem;">
          {% for tag in post.tags %}
          <span class="tag" style="font-size: 0.65rem;">{{ tag }}</span>
          {% endfor %}
        </div>
        {% endif %}
      </a>
      {% endfor %}
    </div>
    <div style="text-align: center; margin-top: 2rem;" class="reveal">
      <a href="{{ site.data.portfolio.blog.medium_url }}" target="_blank" rel="noopener" class="btn btn-outline">
        <i class="fab fa-medium"></i> Read more on Medium
      </a>
    </div>
  </div>
</section>
