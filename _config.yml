# Site Settings
title: "Shubham Kumar | AI/ML Engineer"
description: "Portfolio of Shubham Kumar - AI/ML Engineer specializing in Generative AI, Agentic AI, and Data Engineering"
url: "https://shubham-kumar-47.github.io"
baseurl: ""
author: "Shubham Kumar"
lang: en
logo: /assets/images/favicon.svg
image: /assets/images/og-image.png

# Build Settings
markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge
highlighter: rouge
encoding: utf-8

# Sass
sass:
  sass_dir: _sass
  style: compressed

# Plugins
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap

# Include (force Jekyll to include the CV PDF)
include:
  - Shubham_K_CV_2026_May.pdf

# Exclude
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - README.md
  - .devcontainer
  - generate_assets.py
