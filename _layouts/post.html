---
layout: default
---
<section class="blog-post" style="padding-top: 6rem;">
  <div class="container">
    <article class="glass-card" style="max-width: 800px; margin: 0 auto;">
      <h1>{{ page.title }}</h1>
      <p class="post-meta" style="color: #6b6b7b; font-size: 0.875rem; margin-bottom: 2rem;">
        {{ page.date | date: "%B %d, %Y" }}
      </p>
      <div class="post-content">
        {{ content }}
      </div>
    </article>
  </div>
</section>
